<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEF Pro - Prescripción Biopsicosocial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); padding: 10px; }
        .container { background: var(--white); max-width: 850px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px;}
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 0.95rem; margin-bottom: 15px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-calc { background: var(--accent); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .btn-pdf { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        
        #resultado { margin-top: 25px; display: none; }
        .score-header { text-align: center; padding: 15px; border-radius: 8px; color: white; margin-bottom: 15px; }
        
        /* Estilos de las dos secciones */
        .seccion-pro { background: #f8f9fa; border: 1px solid #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .seccion-paciente { background: #fff; border: 1px solid #27ae60; padding: 15px; border-radius: 8px; }
        
        .titulo-seccion { font-weight: bold; text-transform: uppercase; border-bottom: 2px solid; margin-bottom: 10px; padding-bottom: 5px; }
        .pro-title { color: #2c3e50; border-color: #2c3e50; }
        .pac-title { color: #27ae60; border-color: #27ae60; }

        .ejercicios-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ejercicio-item { border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; }
        .ejercicio-img { width: 45px; height: 45px; margin-bottom: 5px; }
        
        .mental-box { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin: 10px 0; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container" id="reporte-final">
    <header>
        <h2 style="margin:0;">Sistema EPEF Pro</h2>
        <p style="color: #7f8c8d; margin:0; font-size: 0.85rem;">Prescripción Dual: Clínica y Pedagógica</p>
    </header>
    
    <div id="form-area">
        <label>Nombre del Paciente</label>
        <input type="text" id="paciente" placeholder="Ej: Juan Pérez">

        <div class="grid-2">
            <div><label>Diagnóstico</label>
            <select id="diagnostico"><option value="riesgo">Riesgo Metabólico</option><option value="prediabetes">Prediabetes</option><option value="dm2">Diabetes Tipo 2</option></select></div>
            <div><label>Complicaciones</label>
            <select id="complicaciones"><option value="no">Sin Complicaciones</option><option value="si">Con Complicaciones (Vasculares)</option></select></div>
        </div>

        <div class="grid-2">
            <div><label>Medicación</label>
            <select id="medicacion"><option value="ninguna">Ninguna</option><option value="metformina">Metformina</option><option value="otra">Insulina / Secretagogos</option></select></div>
            <div><label>Estado Emocional</label>
            <select id="emocional"><option value="estable">Estable</option><option value="ansiedad">Ansiedad/Estrés</option><option value="depresion">Sint. Depresivos</option></select></div>
        </div>

        <div class="grid-2">
            <div><label>Fatiga</label>
            <select id="fatiga"><option value="fatiga_baja">Baja</option><option value="fatiga_media">Media</option><option value="fatiga_alta">Alta</option></select></div>
            <div><label>Actividad Física</label>
            <select id="actividad"><option value="alta">Activo</option><option value="moderada">Moderado</option><option value="baja">Sedentario</option></select></div>
        </div>

        <button class="btn-calc" onclick="clasificarEPEF()">GENERAR PRESCRIPCIÓN DUAL</button>
        <button id="btn-pdf" class="btn-pdf" onclick="generarPDF()">DESCARGAR REPORTE PROFESIONAL</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
const icons = {
    fuerza: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M54,42h-4V22h4c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-8c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h4v20H20V22h4c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-8c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h4v20h-4c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h8c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-4V42h24v4h-4c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h8c1.1,0,2-0.9,2-2v-4C56,42.9,55.1,42,54,42z" fill="#2c3e50"/></svg>`,
    aerobico: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M41.5,12c2.5,0,4.5-2,4.5-4.5S44,3,41.5,3S37,5,37,7.5S39,12,41.5,12z M32.6,35.7l-4.2-6.5c-0.8-1.2-2.1-2-3.6-2h-6.3c-1.4,0-2.5,1.1-2.5,2.5v11.4h4.4V31.6h2.8l4.2,6.5c0.8,1.2,2.1,2,3.6,2h6.3c1.4,0,2.5-1.1,2.5-2.5V26.2h-4.4V35.7z" fill="#2980b9"/></svg>`,
    movilidad: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M32,10c-3.3,0-6,2.7-6,6s2.7,6,6,6s6-2.7,6-6S35.3,10,32,10z M52,50H12c-1.1,0-2,0.9-2,2v2c0,1.1,0.9,2,2,2h40c1.1,0,2-0.9,2-2v-2C54,50.9,53.1,50,52,50z" fill="#27ae60"/></svg>`
};

function clasificarEPEF(){
    const vals = { riesgo:1, prediabetes:2, dm2:3, no:0, si:3, ninguna:0, metformina:1, otra:2, fatiga_baja:0, fatiga_media:1, fatiga_alta:2, estable:0, ansiedad:1, depresion:2, alta:0, moderada:1, baja:2 };
    const pesos = { dx:4, comp:5, med:2, fatiga:2, emocional:2, actividad:3 };
    
    let score = (vals[document.getElementById("diagnostico").value] * pesos.dx) + (vals[document.getElementById("complicaciones").value] * pesos.comp) + (vals[document.getElementById("medicacion").value] * pesos.med) + (vals[document.getElementById("fatiga").value] * pesos.fatiga) + (vals[document.getElementById("emocional").value] * pesos.emocional) + (vals[document.getElementById("actividad").value] * pesos.actividad);

    let e = "", color = "", proRec = "", pacRec = "", ejHTML = "";

    if(score <= 12){
        e="Ia - Prevención"; color="#27ae60";
        proRec = "Intensidad 60-75% VO2max. Enfoque en biogénesis mitocondrial. Fuerza 3 sets de 12-15 reps al 60% 1RM.";
        pacRec = "Camine a paso rápido 30 min diarios. Haga ejercicios de fuerza para endurecer sus músculos 3 veces por semana.";
        ejHTML = `<div class="ejercicio-item">${icons.aerobico}<b>Trote Suave</b></div><div class="ejercicio-item">${icons.fuerza}<b>Sentadillas</b></div>`;
    } else if(score <= 22){
        e="IIb/IIIc - Manejo Activo"; color="#f39c12";
        proRec = "Entrenamiento concurrente. Frecuencia cardíaca en zona 2-3. Vigilancia de GLUT4 y respuesta insulínica post-esfuerzo.";
        pacRec = "Camine 20-30 min. Use bandas elásticas para fortalecer sus brazos y piernas. No se agote demasiado.";
        ejHTML = `<div class="ejercicio-item">${icons.fuerza}<b>Bandas Elásticas</b></div><div class="ejercicio-item">${icons.aerobico}<b>Caminata</b></div>`;
    } else {
        e="IVd - Riesgo Clínico"; color="#c0392b";
        proRec = "Ejercicio de baja carga metabólica (<3 METs). Evitar maniobra de Valsalva. Monitoreo estricto de presión arterial.";
        pacRec = "Camine muy suave 10-15 min. Haga estiramientos sentados. Si se siente cansado, deténgase de inmediato.";
        ejHTML = `<div class="ejercicio-item">${icons.movilidad}<b>Estiramiento</b></div><div class="ejercicio-item">${icons.aerobico}<b>Paseo Lento</b></div>`;
    }

    document.getElementById("resultado").style.display = "block";
    document.getElementById("resultado").innerHTML = `
        <div class="score-header" style="background:${color}">
            <b>PACIENTE: ${document.getElementById('paciente').value.toUpperCase() || 'S/N'} | SCORE: ${score} | ESTADIO: ${e}</b>
        </div>
        
        <div class="seccion-pro">
            <div class="titulo-seccion pro-title">1. Prescripción Científica (Uso Profesional)</div>
            <p><b>FITT-VP:</b> Frecuencia 5-7 días/sem | Intensidad: ${proRec}</p>
            <p><b>Nota Médica:</b> Estratificación basada en pesos acumulados (Dx4, Comp5). Vigilar balance de glucosa por medicación.</p>
        </div>

        <div class="seccion-paciente">
            <div class="titulo-seccion pac-title">2. Plan de Entrenamiento (Para el Paciente)</div>
            <p><b>Lo que debe hacer:</b> ${pacRec}</p>
            <div class="ejercicios-grid">${ejHTML}</div>
            <div class="mental-box"><b>Consejo de Seguridad:</b> Revise sus pies hoy mismo. Use calzado deportivo suave e hidrátese bien.</div>
        </div>
    `;
    document.getElementById("btn-pdf").style.display = "block";
}

function generarPDF() {
    const element = document.getElementById('reporte-final');
    document.getElementById('form-area').style.display = 'none';
    html2pdf().set({ margin: 10, filename: 'EPEF_Dual_Report.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } })
    .from(element).save().then(()=> { document.getElementById('form-area').style.display = 'block'; });
}
</script>
</body>
</html>
