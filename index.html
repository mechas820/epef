<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEF Pro - Sistema de Prescripción Integral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #27ae60; --warning: #f39c12;
            --danger: #e74c3c; --bg: #f4f7f6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); padding: 10px; }
        .container { background: var(--white); max-width: 800px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px;}
        .form-group { margin-bottom: 12px; text-align: left; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.8rem; color: #34495e; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-calc { background: var(--accent); color: white; font-size: 1.1rem; }
        .btn-pdf { background: var(--primary); color: white; display: none; }
        
        #resultado { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; background: #fff; border: 1px solid #eee; }
        .score-header { text-align: center; padding: 15px; border-radius: 8px; color: white; margin-bottom: 15px; }
        .score-val { font-size: 2rem; font-weight: 800; display: block; }
        
        .section-title { border-bottom: 2px solid #eee; margin: 15px 0 8px; padding-bottom: 5px; color: var(--primary); font-size: 1rem; text-transform: uppercase; font-weight: bold; }
        
        .ejercicios-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .ejercicio-item { border: 1px solid #eee; padding: 12px; border-radius: 8px; text-align: center; background: #fafafa; }
        .ejercicio-img { width: 50px; height: 50px; margin-bottom: 8px; }
        
        .instrucciones-box { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.85rem; margin-top: 15px; border: 1px solid #dee2e6; }
        .mental-box { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin-top: 10px; font-size: 0.85rem; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" id="reporte-final">
    <header>
        <h2 style="margin:0;">Sistema EPEF Pro</h2>
        <p style="color: #7f8c8d; margin:0; font-size: 0.9rem;">Prescripción Integral Basada en Evidencia</p>
    </header>
    
    <div id="form-area">
        <div class="form-group">
            <label>Nombre del Paciente</label>
            <input type="text" id="paciente" placeholder="Nombre completo">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Diagnóstico</label>
                <select id="diagnostico">
                    <option value="riesgo">Riesgo (Sobrepeso/HTA)</option>
                    <option value="prediabetes">Prediabetes</option>
                    <option value="dm2">Diabetes Tipo 2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Complicaciones</label>
                <select id="complicaciones">
                    <option value="no">Sin Complicaciones</option>
                    <option value="si">Con Complicaciones (Vasculares/Neuropatía)</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Medicación</label>
                <select id="medicacion">
                    <option value="ninguna">Ninguna</option>
                    <option value="metformina">Solo Metformina</option>
                    <option value="otra">Otras / Insulina</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estado Emocional</label>
                <select id="emocional">
                    <option value="estable">Estable</option>
                    <option value="ansiedad">Ansiedad / Estrés Elevado</option>
                    <option value="depresion">Sintomatología Depresiva</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Nivel de Fatiga</label>
                <select id="fatiga">
                    <option value="fatiga_baja">Baja (Energía Normal)</option>
                    <option value="fatiga_media">Media (Cansancio)</option>
                    <option value="fatiga_alta">Alta (Agotamiento)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Actividad Física Actual</label>
                <select id="actividad">
                    <option value="alta">Activo (3+ días/sem)</option>
                    <option value="moderada">Moderado (1-2 días/sem)</option>
                    <option value="baja">Sedentario</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-calc" onclick="clasificarEPEF()">CALCULAR Y GENERAR REPORTE</button>
            <button id="btn-pdf" class="btn-pdf" onclick="generarPDF()">DESCARGAR PDF ILUSTRADO</button>
        </div>
    </div>

    <div id="resultado"></div>
</div>

<script>
const icons = {
    fuerza: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M54,42h-4V22h4c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-8c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h4v20H20V22h4c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-8c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h4v20h-4c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h8c1.1,0,2-0.9,2-2v-4c0-1.1-0.9-2-2-2h-4V42h24v4h-4c-1.1,0-2,0.9-2,2v4c0,1.1,0.9,2,2,2h8c1.1,0,2-0.9,2-2v-4C56,42.9,55.1,42,54,42z" fill="#27ae60"/></svg>`,
    aerobico: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M41.5,12c2.5,0,4.5-2,4.5-4.5S44,3,41.5,3S37,5,37,7.5S39,12,41.5,12z M32.6,35.7l-4.2-6.5c-0.8-1.2-2.1-2-3.6-2h-6.3c-1.4,0-2.5,1.1-2.5,2.5v11.4h4.4V31.6h2.8l4.2,6.5c0.8,1.2,2.1,2,3.6,2h6.3c1.4,0,2.5-1.1,2.5-2.5V26.2h-4.4V35.7z" fill="#2980b9"/></svg>`,
    movilidad: `<svg viewBox="0 0 64 64" class="ejercicio-img"><path d="M32,10c-3.3,0-6,2.7-6,6s2.7,6,6,6s6-2.7,6-6S35.3,10,32,10z M52,50H12c-1.1,0-2,0.9-2,2v2c0,1.1,0.9,2,2,2h40c1.1,0,2-0.9,2-2v-2C54,50.9,53.1,50,52,50z" fill="#f39c12"/></svg>`
};

function clasificarEPEF(){
    const vals = { riesgo:1, prediabetes:2, dm2:3, no:0, si:3, ninguna:0, metformina:1, otra:2, fatiga_baja:0, fatiga_media:1, fatiga_alta:2, estable:0, ansiedad:1, depresion:2, alta:0, moderada:1, baja:2 };
    const pesos = { dx:4, comp:5, med:2, fatiga:2, emocional:2, actividad:3 };
    
    const emocionalId = document.getElementById("emocional").value;

    let score = (vals[document.getElementById("diagnostico").value] * pesos.dx) + 
                (vals[document.getElementById("complicaciones").value] * pesos.comp) + 
                (vals[document.getElementById("medicacion").value] * pesos.med) + 
                (vals[document.getElementById("fatiga").value] * pesos.fatiga) + 
                (vals[emocionalId] * pesos.emocional) + 
                (vals[document.getElementById("actividad").value] * pesos.actividad);

    let e = "", c = "", ejHTML = "", mentalNote = "";

    // Notas de salud mental
    if(emocionalId === "ansiedad") mentalNote = `<div class="mental-box"><b>Apoyo Psicoemocional:</b> El ejercicio ayudará a regular su sistema nervioso. Priorice la respiración nasal profunda durante los descansos.</div>`;
    if(emocionalId === "depresion") mentalNote = `<div class="mental-box"><b>Apoyo Psicoemocional:</b> Busque realizar ejercicio en entornos iluminados o con música rítmica. La constancia es más importante que la intensidad hoy.</div>`;

    if(score <= 12){
        e="Estadio Ia - Prevención Primaria"; c="#27ae60";
        ejHTML = `<div class="ejercicio-item">${icons.aerobico}<b>Aeróbico</b><br>Trote o bici 30-40 min.</div><div class="ejercicio-item">${icons.fuerza}<b>Fuerza</b><br>Sentadillas y flexiones.</div>`;
    } else if(score <= 22){
        e="Estadio IIb/IIIc - Manejo Activo"; c="#f1c40f";
        ejHTML = `<div class="ejercicio-item">${icons.fuerza}<b>Fuerza Funcional</b><br>Uso de bandas elásticas.</div><div class="ejercicio-item">${icons.movilidad}<b>Movilidad</b><br>Flexibilidad dinámica.</div>`;
    } else {
        e="Estadio IVd - Cuidado Clínico"; c="#c0392b";
        ejHTML = `<div class="ejercicio-item">${icons.aerobico}<b>Caminata Suave</b><br>15-20 min controlados.</div><div class="ejercicio-item">${icons.movilidad}<b>Estiramiento</b><br>Movimientos sin impacto.</div>`;
    }

    const res = document.getElementById("resultado");
    res.style.display = "block";
    res.innerHTML = `
        <div class="score-header" style="background:${c}">
            <span style="font-size:0.8rem">PACIENTE: ${document.getElementById('paciente').value.toUpperCase() || 'DOCUMENTO CLÍNICO'}</span>
            <span class="score-val">PUNTAJE: ${score}</span>
            <span style="font-weight:bold; letter-spacing:1px;">${e}</span>
        </div>
        
        ${mentalNote}

        <div class="section-title">Prescripción Sugerida</div>
        <div class="ejercicios-grid">${ejHTML}</div>
        
        <div class="instrucciones-box">
            <h4 style="margin:0 0 10px 0; color:var(--primary)">Pautas de Seguridad</h4>
            <ul style="padding-left:18px; margin:0;">
                <li><b>Glucemia:</b> Monitorear antes y después si usa insulina.</li>
                <li><b>Pies:</b> Inspección diaria de calzado y piel.</li>
                <li><b>Hidratación:</b> Beber 250ml de agua cada 20 min de actividad.</li>
                <li><b>Esfuerzo:</b> Use la escala de Borg (debe sentir que el esfuerzo es "algo duro" pero no agotador).</li>
            </ul>
        </div>
    `;
    
    document.getElementById("btn-pdf").style.display = "block";
}

function generarPDF() {
    const elemento = document.getElementById('reporte-final');
    const formArea = document.getElementById('form-area');
    const btnPdf = document.getElementById('btn-pdf');
    const btnCalc = document.querySelector('.btn-calc');

    formArea.style.display = 'none';
    btnPdf.style.display = 'none';
    btnCalc.style.display = 'none';

    html2pdf().set({
        margin: 10,
        filename: `Reporte_EPEF_Pro_${document.getElementById('paciente').value || 'Paciente'}.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(elemento).save().then(() => {
        formArea.style.display = 'block';
        btnPdf.style.display = 'block';
        btnCalc.style.display = 'block';
    });
}
</script>
</body>
</html>
