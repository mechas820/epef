<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEF PRO - Sistema de Prescripción Clínica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0a2e4d; --clinical: #2980b9; --success: #27ae60; 
            --warning: #f39c12; --danger: #c0392b; --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; margin: 0; }
        nav { display: flex; background: var(--primary); padding: 1rem 5%; justify-content: space-between; align-items: center; color: white; }
        .logo { font-weight: 800; font-size: 1.5rem; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

        .role-selector { display: flex; gap: 10px; margin-bottom: 25px; background: #e2e8f0; padding: 5px; border-radius: 12px; }
        .role-btn { flex: 1; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; color: #475569; background: transparent; }
        .role-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; font-size: 1.2rem; }

        .grid-input { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }

        /* Estilos Escalas Desplegables */
        .escala-container { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .escala-header { background: #f1f5f9; padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .escala-content { display: none; padding: 15px; background: white; }
        .item-pregunta { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px inset #f1f5f9; }
        
        /* Botón Complicaciones Profesional */
        .btn-comp-pro { background: #c0392b; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 100%; }

        .btn-main { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .estadio-header { padding: 15px; border-radius: 10px; color: white; text-align: center; font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; }
        
        #timer { font-size: 2rem; font-weight: 900; text-align: center; color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <div class="logo">EPEF PRO <i class="fas fa-heartbeat"></i></div>
    <div style="font-size: 0.8rem; opacity: 0.8;">Protocolo Maestro de Rehabilitación</div>
</nav>

<div class="container">
    <div class="role-selector">
        <button class="role-btn active" onclick="switchTab('pro', this)">MÓDULO PROFESIONAL</button>
        <button class="role-btn" onclick="switchTab('pac', this)">MÓDULO PACIENTE</button>
    </div>

    <div id="view-pro">
        <div class="card">
            <button class="btn-comp-pro" onclick="alert('⚠️ Alerta Clínica: Complicaciones DM2\n- Microvasculares: Retinopatía, Nefropatía, Neuropatía.\n- Macrovasculares: Cardiopatía, ACV, Vasculopatía.\n- Riesgo alto de Pie Diabético.')">
                <i class="fas fa-exclamation-triangle"></i> VER COMPLICACIONES CRÓNICAS DM2
            </button>

            <h2><i class="fas fa-user-md"></i> Datos de la Consulta</h2>
            <div class="grid-input">
                <div><label>Paciente</label><input type="text" id="p-nombre" placeholder="Nombre completo"></div>
                <div><label>Edad</label><input type="number" id="p-edad"></div>
                <div>
                    <label>Medicación</label>
                    <select id="p-med">
                        <option value="metformina">Metformina</option>
                        <option value="insulina">Insulina / Sulfonilureas</option>
                        <option value="sglt2">Inhibidores SGLT2</option>
                    </select>
                </div>
            </div>

            <h2><i class="fas fa-clipboard-list"></i> Valoración por Escalas</h2>
            
            <div class="escala-container">
                <div class="escala-header" onclick="toggleEscala('esc-barthel')"><span>Índice de Barthel (AVD)</span> <span id="val-barthel">Total: 100</span></div>
                <div id="esc-barthel" class="escala-content">
                    <div class="item-pregunta">Alimentación: <select class="calc-b" onchange="sumarBarthel()"><option value="10">Independiente (10)</option><option value="5">Necesita ayuda (5)</option><option value="0">Dependiente (0)</option></select></div>
                    <div class="item-pregunta">Lavado: <select class="calc-b" onchange="sumarBarthel()"><option value="5">Independiente (5)</option><option value="0">Dependiente (0)</option></select></div>
                    <div class="item-pregunta">Vestirse: <select class="calc-b" onchange="sumarBarthel()"><option value="10">Independiente (10)</option><option value="5">Necesita ayuda (5)</option><option value="0">Dependiente (0)</option></select></div>
                    <div class="item-pregunta">Deposición: <select class="calc-b" onchange="sumarBarthel()"><option value="10">Continente (10)</option><option value="5">Accidente ocasional (5)</option><option value="0">Incontinente (0)</option></select></div>
                    <div class="item-pregunta">Micción: <select class="calc-b" onchange="sumarBarthel()"><option value="10">Continente (10)</option><option value="5">Accidente ocasional (5)</option><option value="0">Incontinente (0)</option></select></div>
                </div>
            </div>

            <div class="escala-container">
                <div class="escala-header" onclick="toggleEscala('esc-gad')"><span>Ansiedad (GAD-7)</span> <span id="val-gad">Total: 0</span></div>
                <div id="esc-gad" class="escala-content">
                    <div class="item-pregunta">Nerviosismo/Ansiedad: <select class="calc-g" onchange="sumarGAD()"><option value="0">Nunca</option><option value="1">Varios días</option><option value="2">Más de la mitad</option><option value="3">Casi diario</option></select></div>
                    <div class="item-pregunta">Incapacidad para dejar de preocuparse: <select class="calc-g" onchange="sumarGAD()"><option value="0">Nunca</option><option value="1">Varios días</option><option value="2">Más de la mitad</option><option value="3">Casi diario</option></select></div>
                </div>
            </div>

            <button class="btn-main" onclick="procesarPrescripcion()">GENERAR REPORTE INTEGRAL</button>
        </div>
    </div>

    <div id="resultado-clinico" style="display:none;" class="card">
        <div id="pdf-content">
            </div>
        <button class="btn-main" style="background:var(--primary);" onclick="descargarPDF()">DESCARGAR REPORTE PROFESIONAL (PDF)</button>
    </div>
</div>

<script>
    function toggleEscala(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function sumarBarthel() {
        let suma = 0;
        document.querySelectorAll('.calc-b').forEach(s => suma += parseInt(s.value));
        document.getElementById('val-barthel').innerText = "Total: " + suma;
        return suma;
    }

    function sumarGAD() {
        let suma = 0;
        document.querySelectorAll('.calc-g').forEach(s => suma += parseInt(s.value));
        document.getElementById('val-gad').innerText = "Total: " + suma;
        return suma;
    }

    function switchTab(tab, btn) {
        document.getElementById('view-pro').style.display = tab === 'pro' ? 'block' : 'none';
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function procesarPrescripcion() {
        const nombre = document.getElementById('p-nombre').value || "ANÓNIMO";
        const barthel = sumarBarthel();
        const gad = sumarGAD();
        const med = document.getElementById('p-med').value;

        let riesgo = barthel < 60 ? "ALTO" : "MODERADO";
        let color = barthel < 60 ? "#c0392b" : "#27ae60";

        document.getElementById('resultado-clinico').style.display = "block";
        document.getElementById('pdf-content').innerHTML = `
            <div class="estadio-header" style="background:${color}">REPORTE DE CONSULTA - RIESGO ${riesgo}</div>
            <div style="padding:20px;">
                <h3>Paciente: ${nombre}</h3>
                <p><strong>Medicación:</strong> ${med.toUpperCase()}</p>
                <hr>
                <h4>Resultados de Escalas:</h4>
                <ul>
                    <li><strong>Índice de Barthel:</strong> ${barthel}/100 (AVD)</li>
                    <li><strong>Ansiedad (GAD-7):</strong> ${gad} puntos</li>
                </ul>
                <div style="background:#f9f9f9; padding:15px; border-left:5px solid ${color};">
                    <strong>Sugerencia Clínica:</strong> ${riesgo === 'ALTO' ? 'Priorizar movilidad asistida y control glucémico estricto.' : 'Apto para programa de ejercicio aeróbico moderado.'}
                </div>
                <p style="font-size:0.8rem; margin-top:20px;">Generado por EPEF PRO - ${new Date().toLocaleDateString()}</p>
            </div>
        `;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function descargarPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin: 1,
            filename: 'Reporte_Consulta_EPEF.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
